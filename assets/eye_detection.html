<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eye Detection</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    video, canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #status {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 18px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="status">Initializing camera…</div>

  <script>
    const videoElement = document.getElementById('video');
    const canvasElement = document.getElementById('canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusEl = document.getElementById('status');

    let verified = false;

    function setVerification(ok, reason) {
      statusEl.textContent = reason;
      if (ok && !verified) {
        verified = true;
        // ✅ Send message back to Flutter
        if (window.EyeDetection) {
          EyeDetection.postMessage("verified");
        }
      } else if (!ok && verified) {
        verified = false;
        if (window.EyeDetection) {
          EyeDetection.postMessage("looking_away");
        }
      }
    }

    function onResults(results) {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;

      if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        setVerification(false, "Face not found");
        return;
      }

      const lm = results.multiFaceLandmarks[0];
      const leftIris = lm[468];
      const rightIris = lm[473];

      if (leftIris && rightIris) {
        const irisX = (leftIris.x + rightIris.x) / 2;
        const irisY = (leftIris.y + rightIris.y) / 2;

        const irisXVideo = (1 - irisX) * videoElement.videoWidth;
        const irisYVideo = irisY * videoElement.videoHeight;

        canvasCtx.beginPath();
        canvasCtx.fillStyle = 'rgba(30,144,255,0.95)';
        canvasCtx.arc(irisXVideo, irisYVideo, 5, 0, Math.PI * 2);
        canvasCtx.fill();

        // Simple check: is gaze roughly centered?
        const offsetX = irisX - 0.5;
        const offsetY = irisY - 0.5;
        const gazeOk = Math.abs(offsetX) < 0.15 && Math.abs(offsetY) < 0.15;

        if (gazeOk) {
          setVerification(true, "Face & eyes centered");
        } else {
          setVerification(false, "Looking away detected");
        }
      }
    }

    const faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.55,
      minTrackingConfidence: 0.55
    });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({ image: videoElement });
      },
      width: 640,
      height: 480
    });
    camera.start();
  </script>
</body>
</html>
